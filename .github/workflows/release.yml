name: Release Plugin

on:
  push:
    tags:
      - 'v*'
      - '*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Create lightweight plugin directory
        run: |
          mkdir tabby-quick-scripts
          cp -r dist tabby-quick-scripts/
          cp package.json tabby-quick-scripts/

      - name: Zip plugin directory
        run: zip -r tabby-quick-scripts.zip tabby-quick-scripts

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: tabby-quick-scripts.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
