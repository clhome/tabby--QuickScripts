name: Release Plugin

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show Node and NPM version
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Create lightweight plugin directory
        run: |
          mkdir tabby-quick-scripts
          cp -r dist tabby-quick-scripts/
          cp package.json tabby-quick-scripts/
          cp readme中文.md tabby-quick-scripts/ || true
          cp -r readme中文.assets tabby-quick-scripts/ || true

      - name: Zip plugin directory
        run: zip -r tabby-quick-scripts.zip tabby-quick-scripts

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: tabby-quick-scripts.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 创建 npm 认证文件
      - name: Configure NPM Auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          echo "registry=https://registry.npmjs.org/" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc

      # 调试信息（不会泄露 token）
      - name: Debug NPM Config
        run: |
          echo "===== ~/.npmrc ====="
          cat ~/.npmrc | sed 's/_authToken=.*/_authToken=***HIDDEN***/'
          echo ""
          echo "===== npm config ====="
          npm config list
          echo ""
          echo "===== HOME ====="
          echo $HOME
          echo ""
          echo "===== npm registry ====="
          npm config get registry

      # 检查登录状态
      - name: Check NPM Auth
        run: npm whoami

      # 发布 npm
      - name: Publish to NPM
        run: npm publish --access public
